<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>{% block title %}Intrinsic Value Dashboard{% endblock %}</title><link rel="stylesheet" href="{{ url_for('static',filename='style.css') }}"></head><body><header><div><div class="eyebrow">INVESTMENT ANALYSIS</div><h1>Intrinsic Value Dashboard</h1></div><button class="menu-btn" onclick="document.querySelector('.ticker-nav').classList.toggle('show')">☰ Tickers</button></header>{% if stocks %}<nav class="ticker-nav">{% for s in stocks %}<a class="ticker {% if s.ticker==active %}active{% endif %}" href="{{ url_for('stock',ticker=s.ticker) }}">{{ s.ticker }}</a>{% endfor %}</nav>{% endif %}<main>{% block content %}{% endblock %}</main><footer>Read-only display of Excel valuation workbooks</footer><script src="{{ url_for('static',filename='app.js') }}"></script></body></html>
